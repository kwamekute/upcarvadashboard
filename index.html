<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upcurva Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f6fa; min-height: 100vh; }

    .header { background: white; border-bottom: 1px solid #eee; padding: 16px 20px; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 16px; font-weight: 600; color: #111; }
    .header span { font-size: 12px; color: #aaa; }

    .container { max-width: 700px; margin: 0 auto; padding: 20px 16px; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    @media (min-width: 480px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat { background: white; border-radius: 12px; padding: 14px; border: 1px solid #eee; }
    .stat-label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .stat-val { font-size: 26px; font-weight: 600; color: #111; line-height: 1; }
    .stat-sub { font-size: 11px; color: #bbb; margin-top: 4px; }

    .card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; }
    .card-header { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 13px; font-weight: 500; color: #888; }
    .refresh-btn { font-size: 12px; color: #666; background: #f5f5f5; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; }

    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 14px; color: #aaa; font-weight: 500; font-size: 11px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    td { padding: 11px 14px; border-bottom: 1px solid #f8f8f8; color: #222; vertical-align: middle; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge-green  { background: #dcfce7; color: #166534; }
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .badge-amber  { background: #fef9c3; color: #854d0e; }
    .badge-blue   { background: #dbeafe; color: #1e40af; }
    .badge-gray   { background: #f3f4f6; color: #6b7280; }

    .dots { display: flex; gap: 3px; align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 2px; background: #eee; flex-shrink: 0; }
    .dot.on { background: #22c55e; }

    .loading { text-align: center; padding: 32px; color: #bbb; font-size: 14px; }

    @media (max-width: 480px) {
      th:nth-child(3), td:nth-child(3) { display: none; }
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Upcurva Admin</h1>
  <span id="last-updated"></span>
</div>

<div class="container">
  <div class="stats-grid" id="stats-area">
    <div class="loading" style="grid-column:1/-1">Loading...</div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">users</span>
      <button class="refresh-btn" onclick="load()">Refresh</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Streak</th>
            <th>Last 7 days</th>
            <th>Total Days</th>
            <th>Today</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" class="loading">—</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase
  const db = createClient(
    'https://gmfxqskxktsocmobdmza.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtZnhxc2t4a3Rzb2Ntb2JkbXphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjkxODgsImV4cCI6MjA5MTQwNTE4OH0.q4_VBZV3zi4yTnCx3RT6zuDGyCcPGKLV8xU_EVd4tTE'
  )

  const today = new Date().toISOString().split('T')[0]

  function daysAgo(n) {
    const d = new Date()
    d.setDate(d.getDate() - n)
    return d.toISOString().split('T')[0]
  }

  function calcStreak(days) {
    if (!days.length) return 0
    let count = 0
    let cur = new Date(today)
    if (!days.includes(today)) cur.setDate(cur.getDate() - 1)
    while (true) {
      const d = cur.toISOString().split('T')[0]
      if (days.includes(d)) { count++; cur.setDate(cur.getDate() - 1) }
      else break
    }
    return count
  }

  function isActive(days) {
    const threshold = daysAgo(6)
    return days.filter(d => d >= threshold).length >= 3
  }

  function last7(days) {
    const result = []
    for (let i = 6; i >= 0; i--) result.push(days.includes(daysAgo(i)))
    return result
  }

  function relDate(dateStr) {
    if (!dateStr) return null
    const diff = Math.round((new Date(today) - new Date(dateStr)) / 86400000)
    if (diff === 0) return 'today'
    if (diff === 1) return 'yesterday'
    if (diff < 7) return diff + 'd ago'
    return dateStr
  }

  async function load() {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="loading">Loading...</td></tr>'
    document.getElementById('stats-area').innerHTML = '<div class="loading" style="grid-column:1/-1">Loading...</div>'

    const [{ data: profiles, error: e1 }, { data: meals, error: e2 }] = await Promise.all([
      db.from('profiles').select('*'),
      db.from('meals').select('auth_id, log_date')
    ])

    if (e1 || e2) {
      document.getElementById('tbody').innerHTML = '<tr><td colspan="6" style="color:#ef4444;padding:20px;text-align:center">Error loading data</td></tr>'
      return
    }

    const withProfiles = (profiles || []).filter(p => p.name)
    const totalUsers = withProfiles.length
    let activeCount = 0, loggedTodayCount = 0, totalStreakSum = 0

    const rows = withProfiles.map(p => {
      const userMeals = (meals || []).filter(m => m.auth_id === p.auth_id)
      const days = [...new Set(userMeals.map(m => m.log_date))].sort()
      const streak = calcStreak(days)
      const active = isActive(days)
      const loggedToday = days.includes(today)
      const last = days[days.length - 1] ?? null
      const week = last7(days)

      if (active) activeCount++
      if (loggedToday) loggedTodayCount++
      totalStreakSum += streak

      const weekDots = week.map(on =>
        `<div class="dot${on ? ' on' : ''}"></div>`
      ).join('')

      const todayBadge = loggedToday
        ? '<span class="badge badge-green">yes</span>'
        : '<span class="badge badge-red">no</span>'

      const statusBadge = active
        ? '<span class="badge badge-blue">active</span>'
        : streak > 0
          ? '<span class="badge badge-amber">at risk</span>'
          : '<span class="badge badge-gray">inactive</span>'

      return `<tr>
        <td style="font-weight:500">${p.name}</td>
        <td>${streak > 0 ? streak + ' 🔥' : '<span style="color:#ccc">0</span>'}</td>
        <td><div class="dots">${weekDots}</div></td>
        <td>${days.length}</td>
        <td>${todayBadge}</td>
        <td>${statusBadge}</td>
      </tr>`
    })

    const avgStreak = totalUsers ? Math.round(totalStreakSum / totalUsers) : 0

    document.getElementById('stats-area').innerHTML = `
      <div class="stat">
        <div class="stat-label">total users</div>
        <div class="stat-val">${totalUsers}</div>
        <div class="stat-sub">with profiles</div>
      </div>
      <div class="stat">
        <div class="stat-label">active</div>
        <div class="stat-val">${activeCount}</div>
        <div class="stat-sub">3+ days this week</div>
      </div>
      <div class="stat">
        <div class="stat-label">logged today</div>
        <div class="stat-val">${loggedTodayCount}</div>
        <div class="stat-sub">of ${totalUsers}</div>
      </div>
      <div class="stat">
        <div class="stat-label">avg streak</div>
        <div class="stat-val">${avgStreak}</div>
        <div class="stat-sub">days</div>
      </div>
    `

    document.getElementById('tbody').innerHTML = rows.length
      ? rows.join('')
      : '<tr><td colspan="6" style="color:#bbb;padding:20px;text-align:center">No users yet</td></tr>'

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  }

  load()
</script>

</body>
</html>
